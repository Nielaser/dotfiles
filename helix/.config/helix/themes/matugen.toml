# Helix Theme Template using Material You with improved contrast

# --- Syntax Elements ---

"attribute" = "#d8bafb"
"type" = "#cfc1da"
"type.enum.variant" = "#cfc1da"
"constructor" = "#eedcff"

"constant" = "#f2b7c1"
"constant.character" = "#f2b7c1"
"constant.character.escape" = "#653b43"

"string" = "#d8bafb"
"string.regexp" = "#653b43"
"string.special" = "#eedcff"
"string.special.symbol" = "#ffb4ab"

"comment" = { fg = "#ccc4cf", modifiers = ["italic"] }

"variable" = "#e7e0e8"
"variable.parameter" = { fg = "#93000a", modifiers = ["italic"] }
"variable.builtin" = "#ffb4ab"
"variable.other.member" = "#d8bafb"

"label" = "#eedcff"

"punctuation" = "#ccc4cf"
"punctuation.special" = "#cfc1da"

"keyword" = "#d8bafb"
"keyword.control.conditional" = { fg = "#d8bafb", modifiers = ["italic"] }

"operator" = "#cfc1da"

"function" = "#d8bafb"
"function.macro" = "#533b72"

"tag" = "#d8bafb"
"namespace" = { fg = "#cfc1da", modifiers = ["italic"] }

"special" = "#d8bafb"

# --- Markup ---

"markup.heading.1" = "#ffb4ab"
"markup.heading.2" = "#d8bafb"
"markup.heading.3" = "#cfc1da"
"markup.heading.4" = "#f2b7c1"
"markup.heading.5" = "#eedcff"
"markup.heading.6" = "#533b72"

"markup.list" = "#cfc1da"
"markup.list.unchecked" = "#ccc4cf"
"markup.list.checked" = "#eedcff"

"markup.bold" = { fg = "#d8bafb", modifiers = ["bold"] }
"markup.italic" = { fg = "#cfc1da", modifiers = ["italic"] }

"markup.link.url" = { fg = "#d8bafb", modifiers = ["italic", "underlined"] }
"markup.link.text" = "#eedcff"
"markup.link.label" = "#f2b7c1"
"markup.raw" = "#ffd9de"
"markup.quote" = "#653b43"

# --- Diff ---

"diff.plus" = "#f2b7c1"
"diff.minus" = "#ffb4ab"
"diff.delta" = "#d8bafb"

# --- UI Elements ---

"ui.background" = { fg = "#e7e0e8", bg = "none" }

"ui.linenr" = { fg = "#ccc4cf" }
"ui.linenr.selected" = { fg = "#eedcff" }

"ui.statusline" = { fg = "#eedcff", bg = "none" }
"ui.statusline.inactive" = { fg = "#ccc4cf", bg = "none" }
"ui.statusline.normal" = { fg = "#151218", bg = "none", modifiers = ["bold"] }
"ui.statusline.insert" = { fg = "#151218", bg = "none", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "#151218", bg = "none", modifiers = ["bold"] }

"ui.popup" = { fg = "#e7e0e8", bg = "none" }
"ui.window" = { fg = "#ccc4cf" }
"ui.help" = { fg = "#ccc4cf", bg = "none" }

"ui.bufferline" = { fg = "#ccc4cf", bg = "none" }
"ui.bufferline.active" = { fg = "#3c255a", bg = "#d8bafb", underline = { color = "#d8bafb", style = "line" } }
"ui.bufferline.background" = { bg = "none" }

"ui.text" = "#e7e0e8"
"ui.text.focus" = { fg = "#d8bafb", bg = "none", modifiers = ["bold"] }
"ui.text.inactive" = { fg = "#ccc4cf" }
"ui.text.directory" = { fg = "#d8bafb" }

"ui.virtual" = "#ccc4cf"
"ui.virtual.ruler" = { bg = "none" }
"ui.virtual.indent-guide" = "#1d1a20"
"ui.virtual.inlay-hint" = { fg = "#ccc4cf", bg = "none" }
"ui.virtual.jump-label" = { fg = "#533b72", modifiers = ["bold"] }

"ui.selection" = { bg = "#4a454e" }

"ui.cursor" = { fg = "#151218", bg = "#eedcff" }
"ui.cursor.primary" = { fg = "#151218", bg = "#eedcff" }
"ui.cursor.match" = { fg = "#eedcff", modifiers = ["bold"] }

"ui.highlight" = { bg = "#4c4357", modifiers = ["bold"] }

"ui.menu" = { fg = "#e7e0e8", bg = "none" }
"ui.menu.selected" = { fg = "#d8bafb", bg = "none", modifiers = ["bold"] }

# --- Diagnostics ---

"diagnostic.error" = { fg = "#ffb4ab", underline = { color = "#ffb4ab", style = "curl" } }
"diagnostic.warning" = { fg = "#cfc1da", underline = { color = "#cfc1da", style = "curl" } }
"diagnostic.info" = { fg = "#f2b7c1", underline = { color = "#f2b7c1", style = "curl" } }
"diagnostic.hint" = { fg = "#653b43", underline = { color = "#653b43", style = "curl" } }
"diagnostic.unnecessary" = { modifiers = ["dim"] }

# --- Fallbacks (non-template usage) ---

error = "#ffb4ab"
warning = "#f2b7c1"
info = "#d8bafb"
hint = "#cfc1da"
