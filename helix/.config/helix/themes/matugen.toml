# Helix Theme Template using Material You with improved contrast

# --- Syntax Elements ---

"attribute" = "#ffb0cd"
"type" = "#e1bdc9"
"type.enum.variant" = "#e1bdc9"
"constructor" = "#ffd9e5"

"constant" = "#f1bc96"
"constant.character" = "#f1bc96"
"constant.character.escape" = "#633e22"

"string" = "#ffb0cd"
"string.regexp" = "#633e22"
"string.special" = "#ffd9e5"
"string.special.symbol" = "#ffb4ab"

"comment" = { fg = "#d5c2c7", modifiers = ["italic"] }

"variable" = "#eedfe2"
"variable.parameter" = { fg = "#93000a", modifiers = ["italic"] }
"variable.builtin" = "#ffb4ab"
"variable.other.member" = "#ffb0cd"

"label" = "#ffd9e5"

"punctuation" = "#d5c2c7"
"punctuation.special" = "#e1bdc9"

"keyword" = "#ffb0cd"
"keyword.control.conditional" = { fg = "#ffb0cd", modifiers = ["italic"] }

"operator" = "#e1bdc9"

"function" = "#ffb0cd"
"function.macro" = "#6e334d"

"tag" = "#ffb0cd"
"namespace" = { fg = "#e1bdc9", modifiers = ["italic"] }

"special" = "#ffb0cd"

# --- Markup ---

"markup.heading.1" = "#ffb4ab"
"markup.heading.2" = "#ffb0cd"
"markup.heading.3" = "#e1bdc9"
"markup.heading.4" = "#f1bc96"
"markup.heading.5" = "#ffd9e5"
"markup.heading.6" = "#6e334d"

"markup.list" = "#e1bdc9"
"markup.list.unchecked" = "#d5c2c7"
"markup.list.checked" = "#ffd9e5"

"markup.bold" = { fg = "#ffb0cd", modifiers = ["bold"] }
"markup.italic" = { fg = "#e1bdc9", modifiers = ["italic"] }

"markup.link.url" = { fg = "#ffb0cd", modifiers = ["italic", "underlined"] }
"markup.link.text" = "#ffd9e5"
"markup.link.label" = "#f1bc96"
"markup.raw" = "#ffdcc4"
"markup.quote" = "#633e22"

# --- Diff ---

"diff.plus" = "#f1bc96"
"diff.minus" = "#ffb4ab"
"diff.delta" = "#ffb0cd"

# --- UI Elements ---

"ui.background" = { fg = "#eedfe2", bg = "none" }

"ui.linenr" = { fg = "#d5c2c7" }
"ui.linenr.selected" = { fg = "#ffd9e5" }

"ui.statusline" = { fg = "#ffd9e5", bg = "none" }
"ui.statusline.inactive" = { fg = "#d5c2c7", bg = "none" }
"ui.statusline.normal" = { fg = "#191114", bg = "none", modifiers = ["bold"] }
"ui.statusline.insert" = { fg = "#191114", bg = "none", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "#191114", bg = "none", modifiers = ["bold"] }

"ui.popup" = { fg = "#eedfe2", bg = "none" }
"ui.window" = { fg = "#d5c2c7" }
"ui.help" = { fg = "#d5c2c7", bg = "none" }

"ui.bufferline" = { fg = "#d5c2c7", bg = "none" }
"ui.bufferline.active" = { fg = "#531d36", bg = "#ffb0cd", underline = { color = "#ffb0cd", style = "line" } }
"ui.bufferline.background" = { bg = "none" }

"ui.text" = "#eedfe2"
"ui.text.focus" = { fg = "#ffb0cd", bg = "none", modifiers = ["bold"] }
"ui.text.inactive" = { fg = "#d5c2c7" }
"ui.text.directory" = { fg = "#ffb0cd" }

"ui.virtual" = "#d5c2c7"
"ui.virtual.ruler" = { bg = "none" }
"ui.virtual.indent-guide" = "#21191c"
"ui.virtual.inlay-hint" = { fg = "#d5c2c7", bg = "none" }
"ui.virtual.jump-label" = { fg = "#6e334d", modifiers = ["bold"] }

"ui.selection" = { bg = "#514347" }

"ui.cursor" = { fg = "#191114", bg = "#ffd9e5" }
"ui.cursor.primary" = { fg = "#191114", bg = "#ffd9e5" }
"ui.cursor.match" = { fg = "#ffd9e5", modifiers = ["bold"] }

"ui.highlight" = { bg = "#5a3f49", modifiers = ["bold"] }

"ui.menu" = { fg = "#eedfe2", bg = "none" }
"ui.menu.selected" = { fg = "#ffb0cd", bg = "none", modifiers = ["bold"] }

# --- Diagnostics ---

"diagnostic.error" = { fg = "#ffb4ab", underline = { color = "#ffb4ab", style = "curl" } }
"diagnostic.warning" = { fg = "#e1bdc9", underline = { color = "#e1bdc9", style = "curl" } }
"diagnostic.info" = { fg = "#f1bc96", underline = { color = "#f1bc96", style = "curl" } }
"diagnostic.hint" = { fg = "#633e22", underline = { color = "#633e22", style = "curl" } }
"diagnostic.unnecessary" = { modifiers = ["dim"] }

# --- Fallbacks (non-template usage) ---

error = "#ffb4ab"
warning = "#f1bc96"
info = "#ffb0cd"
hint = "#e1bdc9"
