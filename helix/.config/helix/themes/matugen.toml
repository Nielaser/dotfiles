# Helix Theme Template using Material You with improved contrast

# --- Syntax Elements ---

"attribute" = "#fcb975"
"type" = "#e1c1a4"
"type.enum.variant" = "#e1c1a4"
"constructor" = "#ffdcbe"

"constant" = "#c0cc9a"
"constant.character" = "#c0cc9a"
"constant.character.escape" = "#414b24"

"string" = "#fcb975"
"string.regexp" = "#414b24"
"string.special" = "#ffdcbe"
"string.special.symbol" = "#ffb4ab"

"comment" = { fg = "#d5c3b5", modifiers = ["italic"] }

"variable" = "#efe0d5"
"variable.parameter" = { fg = "#93000a", modifiers = ["italic"] }
"variable.builtin" = "#ffb4ab"
"variable.other.member" = "#fcb975"

"label" = "#ffdcbe"

"punctuation" = "#d5c3b5"
"punctuation.special" = "#e1c1a4"

"keyword" = "#fcb975"
"keyword.control.conditional" = { fg = "#fcb975", modifiers = ["italic"] }

"operator" = "#e1c1a4"

"function" = "#fcb975"
"function.macro" = "#693c00"

"tag" = "#fcb975"
"namespace" = { fg = "#e1c1a4", modifiers = ["italic"] }

"special" = "#fcb975"

# --- Markup ---

"markup.heading.1" = "#ffb4ab"
"markup.heading.2" = "#fcb975"
"markup.heading.3" = "#e1c1a4"
"markup.heading.4" = "#c0cc9a"
"markup.heading.5" = "#ffdcbe"
"markup.heading.6" = "#693c00"

"markup.list" = "#e1c1a4"
"markup.list.unchecked" = "#d5c3b5"
"markup.list.checked" = "#ffdcbe"

"markup.bold" = { fg = "#fcb975", modifiers = ["bold"] }
"markup.italic" = { fg = "#e1c1a4", modifiers = ["italic"] }

"markup.link.url" = { fg = "#fcb975", modifiers = ["italic", "underlined"] }
"markup.link.text" = "#ffdcbe"
"markup.link.label" = "#c0cc9a"
"markup.raw" = "#dce8b4"
"markup.quote" = "#414b24"

# --- Diff ---

"diff.plus" = "#c0cc9a"
"diff.minus" = "#ffb4ab"
"diff.delta" = "#fcb975"

# --- UI Elements ---

"ui.background" = { fg = "#efe0d5", bg = "none" }

"ui.linenr" = { fg = "#d5c3b5" }
"ui.linenr.selected" = { fg = "#ffdcbe" }

"ui.statusline" = { fg = "#ffdcbe", bg = "none" }
"ui.statusline.inactive" = { fg = "#d5c3b5", bg = "none" }
"ui.statusline.normal" = { fg = "#19120c", bg = "none", modifiers = ["bold"] }
"ui.statusline.insert" = { fg = "#19120c", bg = "none", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "#19120c", bg = "none", modifiers = ["bold"] }

"ui.popup" = { fg = "#efe0d5", bg = "none" }
"ui.window" = { fg = "#d5c3b5" }
"ui.help" = { fg = "#d5c3b5", bg = "none" }

"ui.bufferline" = { fg = "#d5c3b5", bg = "none" }
"ui.bufferline.active" = { fg = "#4a2800", bg = "#fcb975", underline = { color = "#fcb975", style = "line" } }
"ui.bufferline.background" = { bg = "none" }

"ui.text" = "#efe0d5"
"ui.text.focus" = { fg = "#fcb975", bg = "none", modifiers = ["bold"] }
"ui.text.inactive" = { fg = "#d5c3b5" }
"ui.text.directory" = { fg = "#fcb975" }

"ui.virtual" = "#d5c3b5"
"ui.virtual.ruler" = { bg = "none" }
"ui.virtual.indent-guide" = "#211a14"
"ui.virtual.inlay-hint" = { fg = "#d5c3b5", bg = "none" }
"ui.virtual.jump-label" = { fg = "#693c00", modifiers = ["bold"] }

"ui.selection" = { bg = "#51453a" }

"ui.cursor" = { fg = "#19120c", bg = "#ffdcbe" }
"ui.cursor.primary" = { fg = "#19120c", bg = "#ffdcbe" }
"ui.cursor.match" = { fg = "#ffdcbe", modifiers = ["bold"] }

"ui.highlight" = { bg = "#59422c", modifiers = ["bold"] }

"ui.menu" = { fg = "#efe0d5", bg = "none" }
"ui.menu.selected" = { fg = "#fcb975", bg = "none", modifiers = ["bold"] }

# --- Diagnostics ---

"diagnostic.error" = { fg = "#ffb4ab", underline = { color = "#ffb4ab", style = "curl" } }
"diagnostic.warning" = { fg = "#e1c1a4", underline = { color = "#e1c1a4", style = "curl" } }
"diagnostic.info" = { fg = "#c0cc9a", underline = { color = "#c0cc9a", style = "curl" } }
"diagnostic.hint" = { fg = "#414b24", underline = { color = "#414b24", style = "curl" } }
"diagnostic.unnecessary" = { modifiers = ["dim"] }

# --- Fallbacks (non-template usage) ---

error = "#ffb4ab"
warning = "#c0cc9a"
info = "#fcb975"
hint = "#e1c1a4"
