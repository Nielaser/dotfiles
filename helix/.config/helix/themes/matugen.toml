# Helix Theme Template using Material You with improved contrast

# --- Syntax Elements ---

"attribute" = "#80d4dc"
"type" = "#b1cbce"
"type.enum.variant" = "#b1cbce"
"constructor" = "#9df0f9"

"constant" = "#b7c7ea"
"constant.character" = "#b7c7ea"
"constant.character.escape" = "#384764"

"string" = "#80d4dc"
"string.regexp" = "#384764"
"string.special" = "#9df0f9"
"string.special.symbol" = "#ffb4ab"

"comment" = { fg = "#bec8c9", modifiers = ["italic"] }

"variable" = "#dee4e4"
"variable.parameter" = { fg = "#93000a", modifiers = ["italic"] }
"variable.builtin" = "#ffb4ab"
"variable.other.member" = "#80d4dc"

"label" = "#9df0f9"

"punctuation" = "#bec8c9"
"punctuation.special" = "#b1cbce"

"keyword" = "#80d4dc"
"keyword.control.conditional" = { fg = "#80d4dc", modifiers = ["italic"] }

"operator" = "#b1cbce"

"function" = "#80d4dc"
"function.macro" = "#004f55"

"tag" = "#80d4dc"
"namespace" = { fg = "#b1cbce", modifiers = ["italic"] }

"special" = "#80d4dc"

# --- Markup ---

"markup.heading.1" = "#ffb4ab"
"markup.heading.2" = "#80d4dc"
"markup.heading.3" = "#b1cbce"
"markup.heading.4" = "#b7c7ea"
"markup.heading.5" = "#9df0f9"
"markup.heading.6" = "#004f55"

"markup.list" = "#b1cbce"
"markup.list.unchecked" = "#bec8c9"
"markup.list.checked" = "#9df0f9"

"markup.bold" = { fg = "#80d4dc", modifiers = ["bold"] }
"markup.italic" = { fg = "#b1cbce", modifiers = ["italic"] }

"markup.link.url" = { fg = "#80d4dc", modifiers = ["italic", "underlined"] }
"markup.link.text" = "#9df0f9"
"markup.link.label" = "#b7c7ea"
"markup.raw" = "#d7e2ff"
"markup.quote" = "#384764"

# --- Diff ---

"diff.plus" = "#b7c7ea"
"diff.minus" = "#ffb4ab"
"diff.delta" = "#80d4dc"

# --- UI Elements ---

"ui.background" = { fg = "#dee4e4", bg = "none" }

"ui.linenr" = { fg = "#bec8c9" }
"ui.linenr.selected" = { fg = "#9df0f9" }

"ui.statusline" = { fg = "#9df0f9", bg = "none" }
"ui.statusline.inactive" = { fg = "#bec8c9", bg = "none" }
"ui.statusline.normal" = { fg = "#0e1415", bg = "none", modifiers = ["bold"] }
"ui.statusline.insert" = { fg = "#0e1415", bg = "none", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "#0e1415", bg = "none", modifiers = ["bold"] }

"ui.popup" = { fg = "#dee4e4", bg = "none" }
"ui.window" = { fg = "#bec8c9" }
"ui.help" = { fg = "#bec8c9", bg = "none" }

"ui.bufferline" = { fg = "#bec8c9", bg = "none" }
"ui.bufferline.active" = { fg = "#00363b", bg = "#80d4dc", underline = { color = "#80d4dc", style = "line" } }
"ui.bufferline.background" = { bg = "none" }

"ui.text" = "#dee4e4"
"ui.text.focus" = { fg = "#80d4dc", bg = "none", modifiers = ["bold"] }
"ui.text.inactive" = { fg = "#bec8c9" }
"ui.text.directory" = { fg = "#80d4dc" }

"ui.virtual" = "#bec8c9"
"ui.virtual.ruler" = { bg = "none" }
"ui.virtual.indent-guide" = "#161d1d"
"ui.virtual.inlay-hint" = { fg = "#bec8c9", bg = "none" }
"ui.virtual.jump-label" = { fg = "#004f55", modifiers = ["bold"] }

"ui.selection" = { bg = "#3f4849" }

"ui.cursor" = { fg = "#0e1415", bg = "#9df0f9" }
"ui.cursor.primary" = { fg = "#0e1415", bg = "#9df0f9" }
"ui.cursor.match" = { fg = "#9df0f9", modifiers = ["bold"] }

"ui.highlight" = { bg = "#324b4d", modifiers = ["bold"] }

"ui.menu" = { fg = "#dee4e4", bg = "none" }
"ui.menu.selected" = { fg = "#80d4dc", bg = "none", modifiers = ["bold"] }

# --- Diagnostics ---

"diagnostic.error" = { fg = "#ffb4ab", underline = { color = "#ffb4ab", style = "curl" } }
"diagnostic.warning" = { fg = "#b1cbce", underline = { color = "#b1cbce", style = "curl" } }
"diagnostic.info" = { fg = "#b7c7ea", underline = { color = "#b7c7ea", style = "curl" } }
"diagnostic.hint" = { fg = "#384764", underline = { color = "#384764", style = "curl" } }
"diagnostic.unnecessary" = { modifiers = ["dim"] }

# --- Fallbacks (non-template usage) ---

error = "#ffb4ab"
warning = "#b7c7ea"
info = "#80d4dc"
hint = "#b1cbce"
