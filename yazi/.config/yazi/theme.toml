# : Manager [[[

[mgr]
cwd = { fg = "#dee4e4" }

# Find
find_keyword  = { fg = "#ffb4ab", bold = true, italic = true, underline = true }
find_position = { fg = "#ffb4ab", bold = true, italic = true }

# Marker
marker_copied   = { fg = "#7198ff", bg = "#7198ff" }
marker_cut      = { fg = "#d7e2ff", bg = "#d7e2ff" }
marker_marked   = { fg = "#ffb4ab", bg = "#ffb4ab" }
marker_selected = { fg = "#b7c7ea", bg = "#b7c7ea" }

# Count
count_copied   = { fg = "#0a1b36", bg = "#d7e2ff" }
count_cut      = { fg = "#0a1b36", bg = "#d7e2ff" }
count_selected = { fg = "#00363b", bg = "#b7c7ea" }

# Border
border_symbol = "│"
border_style  = { fg = "#80d4dc" }

# : ]]]


# : Indicator [[[

[indicator]
padding = { open = "█", close = "█" }

# : ]]]


# : Tabs [[[

[tabs]
active    = { fg = "#80d4dc", bold = true, bg = "#0e1415" }
inactive  = { fg = "#b1cbce", bg = "#0e1415" }
sep_inner = { open = "[", close = "]" }

# : ]]]


# : Mode [[[

[mode]
# Mode
normal_main = { bg = "#80d4dc", fg = "#00363b", bold = true }
normal_alt  = { bg = "#3f4849", fg = "#bec8c9" }

# Select mode
select_main = { bg = "#b1cbce", fg = "#1b3437", bold = true }
select_alt  = { bg = "#3f4849", fg = "#bec8c9" }

# Unset mode
unset_main = { bg = "#b7c7ea", fg = "#21304c", bold = true }
unset_alt  = { bg = "#3f4849", fg = "#bec8c9" }

# : ]]]


# : Status [[[

[status]
sep_left  = { open = "🭁", close = "🭠" }
sep_right = { open = "🭁", close = "🭠" }

# Permissions
perm_type  = { fg = "#59888d" }
perm_write = { fg = "#416bc7" }
perm_read  = { fg = "#ff2b12" }
perm_exec  = { fg = "#3e73ff" }
perm_sep   = { fg = "#0fd9ee" }

# Progress
progress_label  = { bold = true }
progress_normal = { fg = "#80d4dc", bg = "#343a3b" }
progress_error  = { fg = "#ffb4ab", bg = "#343a3b" }

# : ]]]


# : Which [[[

[which]
cols = 3
mask = { bg = "#343a3b" }
cand = { fg = "#80d4dc" }
rest = { fg = "#00363b" }
desc = { fg = "#dee4e4" }
separator = " ▶ "
separator_style = { fg = "#dee4e4" }

# : ]]]


# : Notify [[[

[notify]
title_info  = { fg = "#b7c7ea" }
title_warn  = { fg = "#80d4dc" }
title_error = { fg = "#ffb4ab" }

# : ]]]


# : Picker [[[

[pick]
border = { fg = "#80d4dc" }
active = { fg = "#b7c7ea", bold = true }
inactive = {}

# : ]]]


# : Input [[[

[input]
border = { fg = "#80d4dc" }
value  = { fg = "#dee4e4" }

# : ]]]


# : Completion [[[

[cmp]
border = { fg = "#80d4dc", bg = "#00363b" }

# : ]]]


# : Tasks [[[

[tasks]
border  = { fg = "#80d4dc" }
title   = {}
hovered = { fg = "#d7e2ff", underline = true }

# : ]]]


# : Help [[[

[help]
on     = { fg = "#dee4e4" }
run    = { fg = "#dee4e4" }
footer = { fg = "#1b3437", bg = "#b1cbce" }

# : ]]]


# : File-specific styles [[[

[filetype]

rules = [
    # Images
    { mime = "image/*", fg = "#94e2d5" },

    # Media
    { mime = "{audio,video}/*", fg = "#f9e2af" },

    # Archives
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#f5c2e7" },

    # Documents
    { mime = "application/{pdf,doc,rtf}", fg = "#a6e3a1" },

    # Special files
    { name = "*", is = "orphan", bg = "#93000a" },
    { name = "*", is = "exec", fg = "#ffdad6" },

    # Fallback
    { url = "*", fg = "#dee4e4" },
    { url = "*/", fg = "#80d4dc" },
]

# : ]]]
